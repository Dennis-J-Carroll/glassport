name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Zero dependencies is a design constraint: the suite must pass
      # with nothing but the stdlib, straight from a clone.
      - name: Run tests (stdlib only, no install)
        run: python -m unittest discover -s tests -t . -v

      # A poisoning/credential-leak regression in a renderer must not ship to
      # PyPI: the red-team grills gate the release too (also verifies them
      # across the 3.10-3.13 matrix).
      - name: Poisoning-resistance red-team grills
        run: |
          PYTHONPATH=src python dogfood/eval_advise_redteam.py
          PYTHONPATH=src python dogfood/eval_report_redteam.py
          PYTHONPATH=src python dogfood/eval_sarif_redteam.py
          PYTHONPATH=src python dogfood/eval_server_redteam.py
          PYTHONPATH=src python dogfood/eval_streaming_redteam.py
          PYTHONPATH=src python dogfood/eval_provenance_redteam.py
          PYTHONPATH=src python dogfood/eval_http_tap_redteam.py
          PYTHONPATH=src python dogfood/eval_http_relay_redteam.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check tag matches pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "Tag v$tag does not match pyproject version $version" >&2
            exit 1
          fi

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Smoke test built wheel
        run: |
          pip install dist/*.whl
          glassport --help

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/glassport/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing + PEP 740 attestations)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  github-release:
    # signed-release trail beside PyPI: auto-generated notes from PR
    # titles, dist artifacts attached for the air-gapped install path
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
